<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        header {
            background-color: var(--bg-secondary);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 12px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .toggle-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .toggle-btn:hover {
            background: var(--border-color);
        }

        h1 {
            font-size: 1.5rem;
            color: var(--accent-color);
            text-align: center;
            flex: 1;
        }

        .settings.hidden {
            display: none;
        }

        .settings {
            background-color: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .settings h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .settings-input {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .input-group input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            background-color: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-height: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background-color: var(--accent-color);
            color: var(--bg-primary);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.assistant {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message.error {
            background-color: #da3633;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px 16px;
            align-self: flex-start;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            display: flex;
            gap: 10px;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            font-family: inherit;
        }

        .chat-input-area textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .chat-input-area button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: var(--bg-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            align-self: flex-end;
        }

        .chat-input-area button:hover {
            background-color: #4a90d9;
        }

        .chat-input-area button:disabled {
            background-color: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .clear-chat-btn {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            align-self: flex-end;
        }

        .clear-chat-btn:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .clear-chat-btn:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            header { padding: 10px 15px; gap: 10px; }
            h1 { font-size: 1.2rem; }
            .settings { padding: 15px; }
            .chat-messages { padding: 15px; max-height: 400px; }
            .message { max-width: 90%; }
            .chat-input-area { padding: 10px 15px; flex-direction: column; }
            .chat-input-area button { width: 100%; }
            .toggle-btn { padding: 6px 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <button class="toggle-btn" id="toggleBtn" aria-label="Настройки API">⚙ Настройки API</button>
            <h1>AI Chat</h1>
        </header>

        <div class="settings hidden" id="settingsPanel">
            <h2>Настройки API</h2>
            <div class="settings-input">
                <div class="input-group">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="Введите ваш API Key" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="baseUrl">Base URL</label>
                    <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
                </div>
                <div class="input-group">
                    <label for="modelId">Model ID</label>
                    <input type="text" id="modelId" placeholder="gpt-3.5-turbo" value="gpt-3.5-turbo">
                </div>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <textarea id="userInput" placeholder="Введите сообщение..." rows="1"></textarea>
                <button id="sendBtn" disabled>Отправить</button>
            </div>
            <button class="clear-chat-btn" id="clearBtn">Очистить чат</button>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('toggleBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const apiKeyInput = document.getElementById('apiKey');
        const baseUrlInput = document.getElementById('baseUrl');
        const modelIdInput = document.getElementById('modelId');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMessages = document.getElementById('chatMessages');
        const clearBtn = document.getElementById('clearBtn');

        let conversationHistory = [];
        let isTyping = false;

        // Toggle settings panel
        toggleBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('hidden');
            toggleBtn.textContent = settingsPanel.classList.contains('hidden') ? '⚙ Настройки API' : '⚙ Скрыть настройки';
        });

        // Enable send button when input has content
        userInput.addEventListener('input', () => {
            sendBtn.disabled = !userInput.value.trim();
        });

        // Auto-resize textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
        });

        // Send message on Enter (Shift+Enter for new line)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) sendMessage();
            }
        });

        // Send message
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isTyping) return;

            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                addMessage('Пожалуйста, введите API Key в настройках', 'error');
                return;
            }

            addMessage(message, 'user');
            conversationHistory.push({ role: 'user', content: message });
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            showTypingIndicator();

            try {
                const base = baseUrlInput.value.trim().replace(/\/+$/, '');
                // Если URL уже содержит /chat/completions — не добавляем повторно
                const hasChatCompletions = /chat\/completions\/?$/i.test(base);
                const url = hasChatCompletions ? base : `${base}/chat/completions`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: modelIdInput.value.trim() || 'gpt-3.5-turbo',
                        messages: conversationHistory,
                        stream: false
                    })
                });
                hideTypingIndicator();

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `Ошибка: ${response.status}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '(пустой ответ)';
                addMessage(reply, 'assistant');
                conversationHistory.push({ role: 'assistant', content: reply });

            } catch (err) {
                hideTypingIndicator();
                addMessage(`Ошибка: ${err.message}`, 'assistant');
                console.error(err);
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            isTyping = true;
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTypingIndicator() {
            isTyping = false;
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Clear chat
        clearBtn.addEventListener('click', () => {
            chatMessages.innerHTML = '';
            conversationHistory = [];
        });

        // Load saved settings
        window.addEventListener('load', () => {
            apiKeyInput.value = localStorage.getItem('apiKey') || '';
            baseUrlInput.value = localStorage.getItem('baseUrl') || 'https://api.openai.com/v1';
            modelIdInput.value = localStorage.getItem('modelId') || 'gpt-3.5-turbo';
        });

        // Save settings
        [apiKeyInput, baseUrlInput, modelIdInput].forEach(input => {
            input.addEventListener('change', () => {
                localStorage.setItem(input.id, input.value);
            });
        });

        sendBtn.addEventListener('click', sendMessage);
    </script>
</body>
</html>
